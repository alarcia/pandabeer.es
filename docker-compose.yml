name: pandabeer

services:
  postgres:
    image: postgres:16-alpine
    container_name: pandabeer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pandabeer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pandabeer_dev}
      POSTGRES_DB: pandabeer_medusa
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pandabeer-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pandabeer -d pandabeer_medusa"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pandabeer-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - pandabeer-redis-data:/var/lib/redis/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pandabeer-postgres-data:
  pandabeer-redis-data:
